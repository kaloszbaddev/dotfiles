backend = "glx";
vsync = true;

corner-radius = 6.0;

rounded-corners-exclude = [
	"window_type = 'dock'"
];

active-opacity = 0.98;
inactive-opacity = 0.95;

shadow = true;
shadow-radius = 4;
shadow-opacity = 0.6;
shadow-offset-x = -2;
shadow-offset-y = -2;

wintypes:
{
	dock = { shadow = false; }
};


